<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BeatStream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container text-center mt-5">
  <h1>🎵 BeatStream</h1>
  <div class="card p-4 mt-4 shadow">
    <h4 id="songTitle">Song Name</h4>
    <input type="range" id="progressBar" value="0" class="form-range"/>
    <div class="controls mt-3">
      <button class="btn btn-dark" id="prev">⏮</button>
      <button class="btn btn-primary" id="play">▶</button>
      <button class="btn btn-dark" id="next">⏭</button>
    </div>
    <div class="mt-3">
      <label>Volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
    </div>
  </div>
  <div class="mt-5">
    <h3>Playlist</h3>
    <ul class="list-group" id="playlist"></ul>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
